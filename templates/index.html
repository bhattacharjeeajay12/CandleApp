<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CandleView</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #0f111a;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: #e5e7eb;
    }
    #chart { width: 100vw; height: 100vh; }
    .controls {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 1000;
      width: 360px;
      background: rgba(18, 20, 30, 0.92);
      border: 1px solid #2b3140;
      border-radius: 10px;
      backdrop-filter: blur(3px);
      transition: transform 0.25s ease;
      overflow: hidden;
    }
    .controls.collapsed { transform: translateX(calc(-100% + 42px)); }
    .controls-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      border-bottom: 1px solid #2b3140;
      background: rgba(23, 27, 40, 0.95);
    }
    .controls-header h3 { margin: 0; font-size: 13px; color: #cbd5e1; }
    .controls-header button {
      background: #1c2230;
      color: #e5e7eb;
      border: 1px solid #3a4358;
      border-radius: 6px;
      font-size: 11px;
      padding: 3px 8px;
      cursor: pointer;
    }
    .panel-body { padding: 10px; max-height: calc(100vh - 70px); overflow: auto; }
    .controls.collapsed .panel-body { display: none; }
    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .row label { font-size: 12px; color: #cbd5e1; }
    .row input[type="number"],
    .row input[type="range"],
    .row input[type="checkbox"],
    .row select,
    .row button {
      background: #1c2230;
      color: #e5e7eb;
      border: 1px solid #3a4358;
      border-radius: 6px;
      font-size: 12px;
      padding: 4px 6px;
    }
    .row button { cursor: pointer; }
    .row select { min-width: 170px; }
    .mode-note { font-size: 11px; color: #93c5fd; min-height: 16px; margin-top: 4px; }
    .info-box {
      margin-top: 8px;
      border-top: 1px solid #2b3140;
      padding-top: 8px;
      font-size: 11px;
      color: #cbd5e1;
      line-height: 1.5;
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <div class="controls" id="controls">
    <div class="controls-header">
      <h3>Indicators</h3>
      <button id="togglePanelBtn">Collapse</button>
    </div>
    <div class="panel-body">
      <div class="row">
        <label for="addTypeSelect">Add indicator</label>
        <select id="addTypeSelect">
          <option value="fixed-profile">Fixed Range Volume Profile</option>
          <option value="anchored-profile">Anchored Volume Profile</option>
          <option value="vwap-anchored">Anchored VWAP</option>
          <option value="volume-bars">Volume Bars</option>
          <option value="potential-candles">Potential Reversal Candles</option>
          <option value="high-volume-candles">High Volume Candles (N Avg)</option>
        </select>
        <button id="addIndicatorBtn">Add</button>
      </div>
      <div class="row">
        <label for="indicatorSelect">Selected</label>
        <select id="indicatorSelect"></select>
      </div>
      <div class="row">
        <label for="visibleToggle">Visible</label>
        <input id="visibleToggle" type="checkbox" checked />
        <button id="removeIndicatorBtn">Remove</button>
      </div>
      <div class="row">
        <label for="volumeLookbackInput">Volume N</label>
        <input id="volumeLookbackInput" type="number" min="2" max="500" value="20" />
      </div>
      <div class="row">
        <button id="pickRangeBtn">Pick Range (2 clicks)</button>
        <button id="pickPlacementBtn">Pick Placement / Anchor</button>
      </div>
      <div class="row">
        <label for="binsInput">Bins</label>
        <input id="binsInput" type="number" min="8" max="80" value="24" />
        <label for="widthInput">Width</label>
        <input id="widthInput" type="number" min="0.05" max="0.45" step="0.01" value="0.2" />
      </div>
      <div class="row">
        <label for="opacityInput">Opacity</label>
        <input id="opacityInput" type="range" min="0.1" max="0.8" step="0.05" value="0.35" />
        <label for="anchorInput">Anchor %</label>
        <input id="anchorInput" type="range" min="0" max="100" step="1" value="85" />
      </div>
      <div id="modeNote" class="mode-note"></div>
      <div id="indicatorInfo" class="info-box"></div>
    </div>
  </div>

  <div id="chart"></div>
  <script id="ohlc-data" type="application/json">{{ ohlc_data | tojson | safe }}</script>
  <script src="{{ url_for('static', filename='js/indicators/volumeBarsIndicator.js') }}"></script>
  <script src="{{ url_for('static', filename='js/indicators/vwapIndicator.js') }}"></script>
  <script src="{{ url_for('static', filename='js/indicators/volumeProfileIndicator.js') }}"></script>
  <script src="{{ url_for('static', filename='js/indicators/potentialReversalIndicator.js') }}"></script>
  <script src="{{ url_for('static', filename='js/indicators/highVolumeCandlesIndicator.js') }}"></script>
  <script src="{{ url_for('static', filename='js/chartApp.js') }}"></script>
</body>
</html>
