<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CandleView</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #0f111a;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: #e5e7eb;
    }
    #chart { width: 100vw; height: 100vh; }

    .controls {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 1000;
      width: 360px;
      background: rgba(18, 20, 30, 0.92);
      border: 1px solid #2b3140;
      border-radius: 10px;
      backdrop-filter: blur(3px);
      transition: transform 0.25s ease;
      overflow: hidden;
    }
    .controls.collapsed { transform: translateX(calc(-100% + 42px)); }
    .controls-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      border-bottom: 1px solid #2b3140;
      background: rgba(23, 27, 40, 0.95);
    }
    .controls-header h3 { margin: 0; font-size: 13px; color: #cbd5e1; }
    .controls-header button {
      background: #1c2230;
      color: #e5e7eb;
      border: 1px solid #3a4358;
      border-radius: 6px;
      font-size: 11px;
      padding: 3px 8px;
      cursor: pointer;
    }
    .panel-body { padding: 10px; max-height: calc(100vh - 70px); overflow: auto; }
    .controls.collapsed .panel-body { display: none; }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .row label { font-size: 12px; color: #cbd5e1; }
    .row input[type="number"],
    .row input[type="range"],
    .row input[type="checkbox"],
    .row select,
    .row button {
      background: #1c2230;
      color: #e5e7eb;
      border: 1px solid #3a4358;
      border-radius: 6px;
      font-size: 12px;
      padding: 4px 6px;
    }
    .row button { cursor: pointer; }
    .row select { min-width: 170px; }
    .mode-note { font-size: 11px; color: #93c5fd; min-height: 16px; margin-top: 4px; }
    .info-box {
      margin-top: 8px;
      border-top: 1px solid #2b3140;
      padding-top: 8px;
      font-size: 11px;
      color: #cbd5e1;
      line-height: 1.5;
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <div class="controls" id="controls">
    <div class="controls-header">
      <h3>Indicators</h3>
      <button id="togglePanelBtn">Collapse</button>
    </div>
    <div class="panel-body">
      <div class="row">
        <label for="addTypeSelect">Add indicator</label>
        <select id="addTypeSelect">
          <option value="fixed-profile">Fixed Range Volume Profile</option>
          <option value="anchored-profile">Anchored Volume Profile</option>
          <option value="vwap-anchored">Anchored VWAP</option>
          <option value="volume-bars">Volume Bars</option>
          <option value="potential-candles">Potential Reversal Candles</option>
        </select>
        <button id="addIndicatorBtn">Add</button>
      </div>

      <div class="row">
        <label for="indicatorSelect">Selected</label>
        <select id="indicatorSelect"></select>
      </div>

      <div class="row">
        <label for="visibleToggle">Visible</label>
        <input id="visibleToggle" type="checkbox" checked />
        <button id="removeIndicatorBtn">Remove</button>
      </div>

      <div class="row">
        <button id="pickRangeBtn">Pick Range (2 clicks)</button>
        <button id="pickPlacementBtn">Pick Placement / Anchor</button>
      </div>

      <div class="row">
        <label for="binsInput">Bins</label>
        <input id="binsInput" type="number" min="8" max="80" value="24" />
        <label for="widthInput">Width</label>
        <input id="widthInput" type="number" min="0.05" max="0.45" step="0.01" value="0.2" />
      </div>

      <div class="row">
        <label for="opacityInput">Opacity</label>
        <input id="opacityInput" type="range" min="0.1" max="0.8" step="0.05" value="0.35" />
        <label for="anchorInput">Anchor %</label>
        <input id="anchorInput" type="range" min="0" max="100" step="1" value="85" />
      </div>

      <div id="modeNote" class="mode-note"></div>
      <div id="indicatorInfo" class="info-box"></div>
    </div>
  </div>

  <div id="chart"></div>

  <script>
    const rows = JSON.parse('{{ ohlc_data | tojson | safe }}');
    const dates = rows.map((r) => r.date);
    const opens = rows.map((r) => r.open);
    const highs = rows.map((r) => r.high);
    const lows = rows.map((r) => r.low);
    const closes = rows.map((r) => r.close);
    const volumes = rows.map((r) => Number(r.volume || 0));

    const volumeColors = rows.map((r) => (r.close >= r.open ? "rgba(74,222,128,0.75)" : "rgba(239,68,68,0.75)"));
    const sessionVwapValues = [];
    let cumPV = 0;
    let cumV = 0;
    for (let i = 0; i < rows.length; i += 1) {
      const typical = (highs[i] + lows[i] + closes[i]) / 3;
      const vol = Math.max(0, volumes[i] || 0);
      cumPV += typical * vol;
      cumV += vol;
      sessionVwapValues.push(cumV > 0 ? cumPV / cumV : closes[i]);
    }

    const defaultSignalProfile = computeVolumeProfile({
      startIndex: Math.max(0, rows.length - 160),
      endIndex: rows.length - 1,
      bins: 24,
    });
    const potentialSignals = computePotentialSignals(defaultSignalProfile);

    const CANDLE_TRACE = 0;
    const VOLUME_TRACE = 1;
    const SESSION_VWAP_TRACE = 2;
    const ANCHORED_VWAP_TRACE = 3;
    const SIGNAL_TRACE = 4;

    const chartDiv = document.getElementById("chart");
    const controls = document.getElementById("controls");
    const togglePanelBtn = document.getElementById("togglePanelBtn");
    const modeNote = document.getElementById("modeNote");
    const indicatorInfo = document.getElementById("indicatorInfo");
    const addTypeSelect = document.getElementById("addTypeSelect");
    const indicatorSelect = document.getElementById("indicatorSelect");
    const visibleToggle = document.getElementById("visibleToggle");
    const binsInput = document.getElementById("binsInput");
    const widthInput = document.getElementById("widthInput");
    const opacityInput = document.getElementById("opacityInput");
    const anchorInput = document.getElementById("anchorInput");
    const pickRangeBtn = document.getElementById("pickRangeBtn");
    const pickPlacementBtn = document.getElementById("pickPlacementBtn");

    const indicators = [];
    let nextProfileId = 1;
    let activeIndicatorId = null;
    let rangePickState = null;
    let placementPickMode = false;

    const candlestickTrace = {
      type: "candlestick",
      x: dates,
      open: opens,
      high: highs,
      low: lows,
      close: closes,
      yaxis: "y",
      whiskerwidth: 0.6,
      increasing: { line: { color: "#4ade80", width: 1.2 }, fillcolor: "#4ade80" },
      decreasing: { line: { color: "#ef4444", width: 1.2 }, fillcolor: "#ef4444" },
      hovertemplate:
        "Date: %{x}<br>" +
        "Open: %{open:.4f}<br>" +
        "High: %{high:.4f}<br>" +
        "Low: %{low:.4f}<br>" +
        "Close: %{close:.4f}<br>" +
        "Volume: %{customdata:.2f}<extra></extra>",
      customdata: volumes,
    };

    const volumeBarsTrace = {
      type: "bar",
      x: dates,
      y: volumes,
      yaxis: "y2",
      marker: { color: volumeColors },
      opacity: 0.9,
      name: "Volume Bars",
      hovertemplate: "Date: %{x}<br>Volume: %{y:.2f}<extra></extra>",
    };

    const vwapTrace = {
      type: "scatter",
      mode: "lines",
      x: dates,
      y: sessionVwapValues,
      yaxis: "y",
      line: { color: "#f59e0b", width: 1.6 },
      name: "Session VWAP",
      hovertemplate: "Date: %{x}<br>Session VWAP: %{y:.4f}<extra></extra>",
    };

    const anchoredVwapTrace = {
      type: "scatter",
      mode: "lines",
      x: dates,
      y: new Array(dates.length).fill(null),
      yaxis: "y",
      line: { color: "#22d3ee", width: 1.6, dash: "dot" },
      name: "Anchored VWAP",
      hovertemplate: "Date: %{x}<br>Anchored VWAP: %{y:.4f}<extra></extra>",
    };

    const signalTrace = {
      type: "scatter",
      mode: "markers",
      x: potentialSignals.x,
      y: potentialSignals.y,
      yaxis: "y",
      marker: {
        color: potentialSignals.color,
        size: 10,
        symbol: potentialSignals.symbol,
        line: { color: "#0f111a", width: 1 },
      },
      text: potentialSignals.text,
      hovertemplate: "%{text}<extra></extra>",
      name: "Potential Reversal Candles",
    };

    const visibleCount = 70;
    const startIndex = Math.max(0, dates.length - visibleCount);
    const initialRange = dates.length > 0 ? [dates[startIndex], dates[dates.length - 1]] : undefined;

    const layout = {
      paper_bgcolor: "#0f111a",
      plot_bgcolor: "#0f111a",
      margin: { t: 24, r: 24, b: 42, l: 60 },
      dragmode: "pan",
      barmode: "overlay",
      xaxis: {
        title: "Date",
        type: "date",
        color: "#e5e7eb",
        gridcolor: "#2a2f3a",
        rangeslider: { visible: false },
        range: initialRange,
        anchor: "y2",
      },
      yaxis: {
        title: "Price",
        color: "#e5e7eb",
        gridcolor: "#2a2f3a",
        rangemode: "normal",
        autorange: true,
        zeroline: false,
        fixedrange: false,
        domain: [0.28, 1],
      },
      yaxis2: {
        title: "Volume",
        color: "#a7b2c5",
        gridcolor: "#202733",
        zeroline: false,
        fixedrange: false,
        domain: [0, 0.22],
      },
      hovermode: "x",
      shapes: [],
      annotations: [],
      showlegend: false,
    };

    const config = {
      responsive: true,
      displaylogo: false,
      scrollZoom: true,
      doubleClick: "reset",
      modeBarButtonsToRemove: ["select2d", "lasso2d", "autoScale2d"],
    };

    function clamp(value, minVal, maxVal) {
      return Math.max(minVal, Math.min(maxVal, value));
    }

    function isProfileIndicator(ind) {
      return ind && (ind.type === "fixed-profile" || ind.type === "anchored-profile");
    }

    function isAnchoredVwapIndicator(ind) {
      return ind && ind.type === "vwap-anchored";
    }

    function formatNum(num) {
      if (!Number.isFinite(num)) {
        return "N/A";
      }
      return Number(num).toFixed(4);
    }

    function getActiveIndicator() {
      return indicators.find((ind) => ind.id === activeIndicatorId) || null;
    }

    function setModeNote(text) {
      modeNote.textContent = text;
    }

    function indicatorExists(type) {
      return indicators.some((ind) => ind.type === type);
    }

    function createIndicator(type) {
      if ((type === "volume-bars" || type === "vwap-session" || type === "vwap-anchored" || type === "potential-candles") && indicatorExists(type)) {
        const labelMap = {
          "volume-bars": "Volume Bars",
          "vwap-session": "Session VWAP",
          "vwap-anchored": "Anchored VWAP",
          "potential-candles": "Potential Reversal Candles",
        };
        setModeNote(`${labelMap[type]} already exists.`);
        return null;
      }

      if (type === "volume-bars") {
        const ind = { id: "volume-bars", name: "Volume Bars", type, enabled: true, locked: true };
        indicators.push(ind);
        activeIndicatorId = ind.id;
        return ind;
      }
      if (type === "vwap-session") {
        const ind = { id: "vwap-session", name: "Session VWAP", type, enabled: false, locked: true };
        indicators.push(ind);
        activeIndicatorId = ind.id;
        return ind;
      }
      if (type === "vwap-anchored") {
        const ind = {
          id: "vwap-anchored",
          name: "Anchored VWAP",
          type,
          enabled: false,
          locked: true,
          startIndex: Math.max(0, dates.length - 120),
        };
        indicators.push(ind);
        activeIndicatorId = ind.id;
        return ind;
      }
      if (type === "potential-candles") {
        const ind = {
          id: "potential-candles",
          name: "Potential Reversal Candles",
          type,
          enabled: false,
          locked: true,
        };
        indicators.push(ind);
        activeIndicatorId = ind.id;
        return ind;
      }

      const id = `${type}-${nextProfileId}`;
      nextProfileId += 1;
      const rangeStart = Math.max(0, dates.length - 120);
      const profile = {
        id,
        name: type === "fixed-profile" ? `FRVP ${nextProfileId - 1}` : `AVP ${nextProfileId - 1}`,
        type,
        enabled: true,
        locked: false,
        startIndex: rangeStart,
        endIndex: dates.length - 1,
        bins: 24,
        widthPaper: type === "fixed-profile" ? 0.22 : 0.18,
        opacity: 0.35,
        anchorPaper: type === "fixed-profile" ? 0.98 : 0.2,
        side: "left",
        color: type === "fixed-profile" ? "56,189,248" : "167,139,250",
      };
      indicators.push(profile);
      activeIndicatorId = profile.id;
      return profile;
    }

    function removeActiveIndicator() {
      const active = getActiveIndicator();
      if (!active) {
        return;
      }
      if (active.locked) {
        setModeNote("Core indicators cannot be removed, only toggled.");
        return;
      }
      const idx = indicators.findIndex((ind) => ind.id === active.id);
      indicators.splice(idx, 1);
      activeIndicatorId = indicators.length ? indicators[0].id : null;
    }

    function renderIndicatorDropdown() {
      const prev = activeIndicatorId;
      indicatorSelect.innerHTML = "";
      indicators.forEach((ind) => {
        const opt = document.createElement("option");
        const state = ind.enabled ? "On" : "Off";
        opt.value = ind.id;
        opt.textContent = `${ind.name} (${state})`;
        indicatorSelect.appendChild(opt);
      });
      if (prev && indicators.some((ind) => ind.id === prev)) {
        indicatorSelect.value = prev;
      } else if (indicators.length) {
        activeIndicatorId = indicators[0].id;
        indicatorSelect.value = activeIndicatorId;
      }
    }

    function refreshControlValues() {
      const active = getActiveIndicator();
      visibleToggle.checked = Boolean(active?.enabled);
      const profileMode = isProfileIndicator(active);
      const canAnchor = profileMode || isAnchoredVwapIndicator(active);
      binsInput.disabled = !profileMode;
      widthInput.disabled = !profileMode;
      opacityInput.disabled = !profileMode;
      anchorInput.disabled = !profileMode;
      pickRangeBtn.disabled = !profileMode;
      pickPlacementBtn.disabled = !canAnchor;

      if (!profileMode) {
        binsInput.value = 24;
        widthInput.value = 0.2;
        opacityInput.value = 0.35;
        anchorInput.value = 50;
        return;
      }
      binsInput.value = active.bins;
      widthInput.value = active.widthPaper.toFixed(2);
      opacityInput.value = active.opacity;
      anchorInput.value = Math.round(active.anchorPaper * 100);
    }

    function getVisibleYBounds() {
      const xRange = chartDiv.layout?.xaxis?.range;
      if (!xRange || xRange.length !== 2) {
        return [Math.min(...lows), Math.max(...highs)];
      }
      const start = new Date(xRange[0]).getTime();
      const end = new Date(xRange[1]).getTime();
      const minX = Math.min(start, end);
      const maxX = Math.max(start, end);
      let yMin = Number.POSITIVE_INFINITY;
      let yMax = Number.NEGATIVE_INFINITY;
      for (let i = 0; i < dates.length; i += 1) {
        const ts = new Date(dates[i]).getTime();
        if (ts >= minX && ts <= maxX) {
          yMin = Math.min(yMin, lows[i]);
          yMax = Math.max(yMax, highs[i]);
        }
      }
      if (!Number.isFinite(yMin) || !Number.isFinite(yMax)) {
        return [Math.min(...lows), Math.max(...highs)];
      }
      if (yMin === yMax) {
        const pad = Math.max(1e-6, Math.abs(yMin) * 0.005);
        return [yMin - pad, yMax + pad];
      }
      return [yMin, yMax];
    }

    function zoomYAxis(direction) {
      const yAxis = chartDiv.layout?.yaxis || {};
      let currentRange = yAxis.range;
      if (!currentRange || currentRange.length !== 2) {
        currentRange = getVisibleYBounds();
      }
      const low = Number(currentRange[0]);
      const high = Number(currentRange[1]);
      if (!Number.isFinite(low) || !Number.isFinite(high) || high <= low) {
        return;
      }
      const span = high - low;
      const center = (low + high) / 2;
      const zoomStep = 0.12;
      const factor = direction > 0 ? 1 + zoomStep : 1 - zoomStep;
      const newHalfSpan = clamp((span * factor) / 2, 1e-8, Number.MAX_SAFE_INTEGER);
      Plotly.relayout(chartDiv, { "yaxis.autorange": false, "yaxis.range": [center - newHalfSpan, center + newHalfSpan] });
    }

    function computeVolumeProfile(indicator) {
      const start = clamp(Math.min(indicator.startIndex, indicator.endIndex), 0, rows.length - 1);
      const end = clamp(Math.max(indicator.startIndex, indicator.endIndex), 0, rows.length - 1);
      if (end < start) {
        return null;
      }
      let minPrice = Number.POSITIVE_INFINITY;
      let maxPrice = Number.NEGATIVE_INFINITY;
      for (let i = start; i <= end; i += 1) {
        minPrice = Math.min(minPrice, lows[i]);
        maxPrice = Math.max(maxPrice, highs[i]);
      }
      if (!Number.isFinite(minPrice) || !Number.isFinite(maxPrice)) {
        return null;
      }
      const bins = clamp(Number(indicator.bins) || 24, 8, 80);
      const span = Math.max(maxPrice - minPrice, 1e-9);
      const binSize = span / bins;
      const binVolume = new Array(bins).fill(0);

      for (let i = start; i <= end; i += 1) {
        const cLow = lows[i];
        const cHigh = highs[i];
        const cVol = Math.max(0, volumes[i] || 0);
        if (cVol <= 0) {
          continue;
        }
        const range = cHigh - cLow;
        if (range <= 1e-12) {
          const idx = clamp(Math.floor((cLow - minPrice) / binSize), 0, bins - 1);
          binVolume[idx] += cVol;
          continue;
        }
        for (let b = 0; b < bins; b += 1) {
          const bLow = minPrice + b * binSize;
          const bHigh = bLow + binSize;
          const overlap = Math.max(0, Math.min(cHigh, bHigh) - Math.max(cLow, bLow));
          if (overlap > 0) {
            binVolume[b] += cVol * (overlap / range);
          }
        }
      }
      const maxVolume = Math.max(...binVolume, 1e-9);
      const pocIndex = binVolume.reduce((bestIdx, value, idx, arr) => (value > arr[bestIdx] ? idx : bestIdx), 0);
      const totalVolume = binVolume.reduce((acc, val) => acc + val, 0);
      const target = totalVolume * 0.7;
      let accumulated = binVolume[pocIndex];
      let left = pocIndex;
      let right = pocIndex;
      while (accumulated < target && (left > 0 || right < bins - 1)) {
        const leftCandidate = left > 0 ? binVolume[left - 1] : -1;
        const rightCandidate = right < bins - 1 ? binVolume[right + 1] : -1;
        if (rightCandidate >= leftCandidate) {
          right += 1;
          accumulated += Math.max(0, rightCandidate);
        } else {
          left -= 1;
          accumulated += Math.max(0, leftCandidate);
        }
      }
      const poc = minPrice + (pocIndex + 0.5) * binSize;
      const val = minPrice + left * binSize;
      const vah = minPrice + (right + 1) * binSize;
      return { minPrice, maxPrice, bins, binSize, binVolume, maxVolume, poc, val, vah, start, end };
    }

    function getProfileShapesAndLabels(indicator) {
      const profile = computeVolumeProfile(indicator);
      if (!profile) {
        return { shapes: [], annotations: [] };
      }
      const shapes = [];
      const annotations = [];
      const safeAnchor = clamp(indicator.anchorPaper, 0.02, 0.98);
      const maxWidth = clamp(indicator.widthPaper, 0.05, 0.45);

      for (let b = 0; b < profile.bins; b += 1) {
        const v = profile.binVolume[b];
        if (v <= 0) {
          continue;
        }
        const normalized = v / profile.maxVolume;
        const width = maxWidth * normalized;
        let x0 = safeAnchor - width;
        let x1 = safeAnchor;
        if (indicator.side === "right") {
          x0 = safeAnchor;
          x1 = safeAnchor + width;
        }
        x0 = clamp(x0, 0, 1);
        x1 = clamp(x1, 0, 1);
        if (x1 <= x0) {
          continue;
        }
        const y0 = profile.minPrice + b * profile.binSize;
        const y1 = y0 + profile.binSize;
        shapes.push({
          type: "rect",
          xref: "paper",
          yref: "y",
          x0,
          x1,
          y0,
          y1,
          fillcolor: `rgba(${indicator.color},${indicator.opacity})`,
          line: { color: `rgba(${indicator.color},0.5)`, width: 0.4 },
          layer: "above",
        });
      }

      const midPrice = (profile.minPrice + profile.maxPrice) / 2;
      annotations.push({
        xref: "paper",
        yref: "y",
        x: safeAnchor,
        y: midPrice,
        text: indicator.name,
        showarrow: false,
        font: { size: 10, color: "#cbd5e1" },
        bgcolor: "rgba(15,17,26,0.65)",
        bordercolor: "rgba(148,163,184,0.4)",
        borderwidth: 1,
      });

      const lineX0 = clamp(safeAnchor - maxWidth, 0, 1);
      const lineX1 = clamp(safeAnchor, 0, 1);
      const levels = [
        { label: "POC", y: profile.poc, color: "rgba(251,191,36,0.95)" },
        { label: "VAH", y: profile.vah, color: "rgba(45,212,191,0.9)" },
        { label: "VAL", y: profile.val, color: "rgba(45,212,191,0.9)" },
      ];
      levels.forEach((level) => {
        shapes.push({
          type: "line",
          xref: "paper",
          yref: "y",
          x0: lineX0,
          x1: lineX1,
          y0: level.y,
          y1: level.y,
          line: { color: level.color, width: 1.1, dash: "dot" },
          layer: "above",
        });
        annotations.push({
          xref: "paper",
          yref: "y",
          x: lineX0,
          y: level.y,
          text: level.label,
          showarrow: false,
          xanchor: "right",
          font: { size: 9, color: "#e2e8f0" },
          bgcolor: "rgba(15,17,26,0.65)",
          bordercolor: "rgba(148,163,184,0.35)",
          borderwidth: 1,
        });
      });
      return { shapes, annotations };
    }

    function computeAnchoredVwapSeries(startIndex) {
      const output = new Array(dates.length).fill(null);
      let localPV = 0;
      let localV = 0;
      for (let i = clamp(startIndex, 0, dates.length - 1); i < dates.length; i += 1) {
        const typical = (highs[i] + lows[i] + closes[i]) / 3;
        const vol = Math.max(0, volumes[i] || 0);
        localPV += typical * vol;
        localV += vol;
        output[i] = localV > 0 ? localPV / localV : closes[i];
      }
      return output;
    }

    function updateIndicatorInfo() {
      const active = getActiveIndicator();
      if (!active) {
        indicatorInfo.textContent = "No indicator selected.";
        return;
      }
      if (isProfileIndicator(active)) {
        const profile = computeVolumeProfile(active);
        if (!profile) {
          indicatorInfo.textContent = `${active.name}\nNo profile data for current range.`;
          return;
        }
        indicatorInfo.textContent =
          `${active.name}\n` +
          `Candle Range: ${dates[profile.start]} -> ${dates[profile.end]} (${profile.end - profile.start + 1} candles)\n` +
          `Price Range: ${formatNum(profile.minPrice)} -> ${formatNum(profile.maxPrice)}\n` +
          `POC: ${formatNum(profile.poc)}\n` +
          `Value Area: ${formatNum(profile.val)} -> ${formatNum(profile.vah)}`;
        return;
      }
      if (isAnchoredVwapIndicator(active)) {
        indicatorInfo.textContent =
          `${active.name}\n` +
          `Anchor Candle: ${dates[active.startIndex]}\n` +
          `Anchor Index: ${active.startIndex}`;
        return;
      }
      if (active.type === "vwap-session") {
        indicatorInfo.textContent = "Session VWAP starts from first chart candle.";
        return;
      }
      if (active.type === "volume-bars") {
        indicatorInfo.textContent = "Vertical base volume bars (independent of Volume Profile).";
        return;
      }
      if (active.type === "potential-candles") {
        const signalProfileRef = getSignalReferenceProfileRef();
        const signalProfile = signalProfileRef.profile;
        indicatorInfo.textContent =
          "Potential Reversal Candles:\n" +
          "Uses: Volume Spike + Volume Profile levels (POC/VAL/VAH)\n" +
          `Profile Source: ${signalProfileRef.source}\n` +
          `POC: ${formatNum(signalProfile?.poc)} | VAL: ${formatNum(signalProfile?.val)} | VAH: ${formatNum(signalProfile?.vah)}\n` +
          "Green marker = potential upside reversal\n" +
          "Red marker = potential downside reversal";
      }
    }

    function getSignalReferenceProfileRef() {
      const enabledProfiles = indicators.filter((ind) => isProfileIndicator(ind) && ind.enabled);
      if (enabledProfiles.length > 0) {
        const activeProfile = enabledProfiles.find((ind) => ind.id === activeIndicatorId);
        const chosen = activeProfile || enabledProfiles[enabledProfiles.length - 1];
        return { profile: computeVolumeProfile(chosen), source: chosen.name };
      }

      const fallback = computeVolumeProfile({
        startIndex: Math.max(0, rows.length - 160),
        endIndex: rows.length - 1,
        bins: 24,
      });
      return { profile: fallback, source: "Fallback Last 160 Candles" };
    }

    function updateAllIndicators() {
      const volumeEnabled = indicators.some((ind) => ind.type === "volume-bars" && ind.enabled);
      const sessionVwapEnabled = indicators.some((ind) => ind.type === "vwap-session" && ind.enabled);
      const anchoredVwapInd = indicators.find((ind) => ind.type === "vwap-anchored");
      const anchoredVwapEnabled = Boolean(anchoredVwapInd?.enabled);
      const signalEnabled = indicators.some((ind) => ind.type === "potential-candles" && ind.enabled);
      Plotly.restyle(chartDiv, { visible: volumeEnabled }, [VOLUME_TRACE]);
      Plotly.restyle(chartDiv, { visible: sessionVwapEnabled }, [SESSION_VWAP_TRACE]);
      Plotly.restyle(chartDiv, { visible: anchoredVwapEnabled }, [ANCHORED_VWAP_TRACE]);
      Plotly.restyle(chartDiv, { visible: signalEnabled }, [SIGNAL_TRACE]);

      if (anchoredVwapInd) {
        const series = computeAnchoredVwapSeries(anchoredVwapInd.startIndex);
        Plotly.restyle(chartDiv, { y: [series] }, [ANCHORED_VWAP_TRACE]);
      }

      const signalProfileRef = getSignalReferenceProfileRef();
      const refreshedSignals = computePotentialSignals(signalProfileRef.profile);
      Plotly.restyle(
        chartDiv,
        {
          x: [refreshedSignals.x],
          y: [refreshedSignals.y],
          text: [refreshedSignals.text],
          "marker.color": [refreshedSignals.color],
          "marker.symbol": [refreshedSignals.symbol],
        },
        [SIGNAL_TRACE]
      );

      const allShapes = [];
      const allAnnotations = [];
      indicators.filter((ind) => isProfileIndicator(ind) && ind.enabled).forEach((ind) => {
        const result = getProfileShapesAndLabels(ind);
        allShapes.push(...result.shapes);
        allAnnotations.push(...result.annotations);
      });
      Plotly.relayout(chartDiv, { shapes: allShapes, annotations: allAnnotations });

      renderIndicatorDropdown();
      refreshControlValues();
      updateIndicatorInfo();
    }

    function xValueToPaper(xValue) {
      const xRange = chartDiv.layout?.xaxis?.range;
      if (!xRange || xRange.length !== 2) {
        return 0.5;
      }
      const start = new Date(xRange[0]).getTime();
      const end = new Date(xRange[1]).getTime();
      const minX = Math.min(start, end);
      const maxX = Math.max(start, end);
      const xTs = new Date(xValue).getTime();
      if (!Number.isFinite(xTs) || maxX <= minX) {
        return 0.5;
      }
      return clamp((xTs - minX) / (maxX - minX), 0, 1);
    }

    togglePanelBtn.addEventListener("click", () => {
      controls.classList.toggle("collapsed");
      togglePanelBtn.textContent = controls.classList.contains("collapsed") ? "Expand" : "Collapse";
    });

    document.getElementById("addIndicatorBtn").addEventListener("click", () => {
      const ind = createIndicator(addTypeSelect.value);
      if (!ind) {
        return;
      }
      setModeNote(`Added ${ind.name}.`);
      updateAllIndicators();
    });

    document.getElementById("removeIndicatorBtn").addEventListener("click", () => {
      removeActiveIndicator();
      updateAllIndicators();
    });

    indicatorSelect.addEventListener("change", () => {
      activeIndicatorId = indicatorSelect.value;
      rangePickState = null;
      placementPickMode = false;
      refreshControlValues();
    });

    visibleToggle.addEventListener("change", () => {
      const active = getActiveIndicator();
      if (!active) {
        return;
      }
      active.enabled = visibleToggle.checked;
      updateAllIndicators();
      setModeNote(`${active.name} is now ${active.enabled ? "visible" : "hidden"}.`);
    });

    pickRangeBtn.addEventListener("click", () => {
      const active = getActiveIndicator();
      if (!isProfileIndicator(active)) {
        setModeNote("Select a volume profile indicator first.");
        return;
      }
      rangePickState = { step: 1, startIndex: null };
      placementPickMode = false;
      setModeNote("Range mode: click first candle, then ending candle.");
    });

    pickPlacementBtn.addEventListener("click", () => {
      const active = getActiveIndicator();
      if (!isProfileIndicator(active) && !isAnchoredVwapIndicator(active)) {
        setModeNote("Select a profile or Anchored VWAP first.");
        return;
      }
      placementPickMode = true;
      rangePickState = null;
      setModeNote("Placement mode: click any candle to set anchor.");
    });

    binsInput.addEventListener("change", () => {
      const active = getActiveIndicator();
      if (!isProfileIndicator(active)) {
        return;
      }
      active.bins = clamp(Number(binsInput.value) || 24, 8, 80);
      binsInput.value = active.bins;
      updateAllIndicators();
    });

    widthInput.addEventListener("change", () => {
      const active = getActiveIndicator();
      if (!isProfileIndicator(active)) {
        return;
      }
      active.widthPaper = clamp(Number(widthInput.value) || 0.2, 0.05, 0.45);
      widthInput.value = active.widthPaper.toFixed(2);
      updateAllIndicators();
    });

    opacityInput.addEventListener("input", () => {
      const active = getActiveIndicator();
      if (!isProfileIndicator(active)) {
        return;
      }
      active.opacity = clamp(Number(opacityInput.value) || 0.35, 0.1, 0.8);
      updateAllIndicators();
    });

    anchorInput.addEventListener("input", () => {
      const active = getActiveIndicator();
      if (!isProfileIndicator(active)) {
        return;
      }
      active.anchorPaper = clamp((Number(anchorInput.value) || 50) / 100, 0, 1);
      updateAllIndicators();
    });

    Plotly.newPlot(chartDiv, [candlestickTrace, volumeBarsTrace, vwapTrace, anchoredVwapTrace, signalTrace], layout, config).then(() => {
      chartDiv.addEventListener("wheel", (event) => {
        if (!event.shiftKey) {
          return;
        }
        event.preventDefault();
        const direction = event.deltaY > 0 ? 1 : -1;
        zoomYAxis(direction);
      }, { passive: false });

      chartDiv.on("plotly_click", (evt) => {
        if (!evt.points || evt.points.length === 0) {
          return;
        }
        const point = evt.points[0];
        const idx = Number(point.pointNumber);
        if (!Number.isFinite(idx)) {
          return;
        }
        const active = getActiveIndicator();
        if (!active) {
          return;
        }

        if (rangePickState && isProfileIndicator(active)) {
          if (rangePickState.step === 1) {
            rangePickState.startIndex = idx;
            rangePickState.step = 2;
            setModeNote("Now click the ending candle.");
            return;
          }
          active.startIndex = Math.min(rangePickState.startIndex, idx);
          active.endIndex = Math.max(rangePickState.startIndex, idx);
          rangePickState = null;
          setModeNote(`Range set for ${active.name}.`);
          updateAllIndicators();
          return;
        }

        if (placementPickMode) {
          if (isProfileIndicator(active)) {
            active.anchorPaper = xValueToPaper(point.x);
            anchorInput.value = Math.round(active.anchorPaper * 100);
          } else if (isAnchoredVwapIndicator(active)) {
            active.startIndex = idx;
          }
          placementPickMode = false;
          setModeNote(`Anchor set for ${active.name}.`);
          updateAllIndicators();
        }
      });

      chartDiv.on("plotly_relayout", (evt) => {
        const changedXRange =
          Object.prototype.hasOwnProperty.call(evt, "xaxis.range[0]") ||
          Object.prototype.hasOwnProperty.call(evt, "xaxis.range[1]") ||
          Object.prototype.hasOwnProperty.call(evt, "xaxis.autorange");

        if (changedXRange) {
          const [yMin, yMax] = getVisibleYBounds();
          const padding = Math.max((yMax - yMin) * 0.08, Math.abs(yMax) * 0.001, 1e-6);
          Plotly.relayout(chartDiv, { "yaxis.autorange": false, "yaxis.range": [yMin - padding, yMax + padding] });
        }
      });

      createIndicator("volume-bars");
      createIndicator("vwap-session");
      createIndicator("vwap-anchored");
      createIndicator("potential-candles");
      createIndicator("fixed-profile");
      activeIndicatorId = indicators[0]?.id || null;
      updateAllIndicators();
      setModeNote("Use dropdown to choose indicator, toggle visibility, and manage profiles.");
    });

    function computePotentialSignals(profile) {
      const out = { x: [], y: [], text: [], color: [], symbol: [] };
      if (!profile) {
        return out;
      }

      const profileStart = clamp(profile.start ?? 0, 0, rows.length - 1);
      const profileEnd = clamp(profile.end ?? (rows.length - 1), 0, rows.length - 1);
      const priceTolerance = Math.max((profile.maxPrice - profile.minPrice) * 0.012, profile.binSize * 1.1, 1e-8);

      for (let i = 2; i < rows.length - 2; i += 1) {
        if (i < profileStart || i > profileEnd) {
          continue;
        }

        const body = Math.abs(closes[i] - opens[i]);
        const upperWick = highs[i] - Math.max(opens[i], closes[i]);
        const lowerWick = Math.min(opens[i], closes[i]) - lows[i];
        const lookbackStart = Math.max(0, i - 20);
        const avgVolume = volumes.slice(lookbackStart, i + 1).reduce((a, b) => a + b, 0) / (i - lookbackStart + 1);
        const volumeRatio = avgVolume > 0 ? volumes[i] / avgVolume : 0;
        const volSpike = volumeRatio >= 1.35;
        const localLow = lows[i] <= lows[i - 1] && lows[i] <= lows[i + 1];
        const localHigh = highs[i] >= highs[i - 1] && highs[i] >= highs[i + 1];

        const nearVAL = Math.abs(lows[i] - profile.val) <= priceTolerance || (lows[i] <= profile.val && closes[i] >= profile.val);
        const nearVAH = Math.abs(highs[i] - profile.vah) <= priceTolerance || (highs[i] >= profile.vah && closes[i] <= profile.vah);
        const nearPOC = Math.abs(closes[i] - profile.poc) <= priceTolerance;

        const bullish = volSpike && localLow && closes[i] > opens[i] && lowerWick > body * 1.2 && (nearVAL || (nearPOC && closes[i] > profile.poc));
        const bearish = volSpike && localHigh && closes[i] < opens[i] && upperWick > body * 1.2 && (nearVAH || (nearPOC && closes[i] < profile.poc));

        if (bullish) {
          out.x.push(dates[i]);
          out.y.push(lows[i] * 0.9995);
          out.text.push(
            `Potential Upside Reversal<br>Date: ${dates[i]}<br>Close: ${formatNum(closes[i])}` +
            `<br>Volume Spike: ${volumeRatio.toFixed(2)}x` +
            `<br>Near: ${nearVAL ? "VAL" : "POC"} | VAL: ${formatNum(profile.val)} | POC: ${formatNum(profile.poc)}`
          );
          out.color.push("rgba(34,197,94,0.95)");
          out.symbol.push("triangle-up");
        } else if (bearish) {
          out.x.push(dates[i]);
          out.y.push(highs[i] * 1.0005);
          out.text.push(
            `Potential Downside Reversal<br>Date: ${dates[i]}<br>Close: ${formatNum(closes[i])}` +
            `<br>Volume Spike: ${volumeRatio.toFixed(2)}x` +
            `<br>Near: ${nearVAH ? "VAH" : "POC"} | VAH: ${formatNum(profile.vah)} | POC: ${formatNum(profile.poc)}`
          );
          out.color.push("rgba(239,68,68,0.95)");
          out.symbol.push("triangle-down");
        }
      }
      return out;
    }
  </script>
